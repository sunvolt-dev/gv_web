; ─── 사이트 운영 PHP 설정 ───
date.timezone = Asia/Seoul

; 이미지·납품사례 사진 업로드 여유
upload_max_filesize = 20M
post_max_size = 25M
max_file_uploads = 30

memory_limit = 256M
max_execution_time = 60

; 세션 (장바구니·로그인)
session.gc_maxlifetime = 86400  ; 1일

; 한글 처리
mbstring.internal_encoding = UTF-8
default_charset = UTF-8

; 운영 시엔 0으로 — 개발 시 1
display_errors = 1
log_errors = 1
